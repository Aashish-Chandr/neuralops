apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: payment-cpu-hog
  namespace: neuralops
spec:
  appinfo:
    appns: neuralops
    applabel: "app=payment-service"
    appkind: deployment
  chaosServiceAccount: litmus-admin
  monitoring: true
  jobCleanUpPolicy: retain
  experiments:
    - name: pod-cpu-hog
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "90"
            - name: CPU_CORES
              value: "1"
            - name: CPU_LOAD
              value: "90"          # 90% CPU load
            - name: CONTAINER_RUNTIME
              value: docker
            - name: SOCKET_PATH
              value: /var/run/docker.sock
        probe:
          - name: cpu-anomaly-detected
            type: promProbe
            promProbe/inputs:
              endpoint: http://prometheus:9090
              query: "cpu_usage_percent{service=\"payment-service\"} > 75"
              comparator:
                type: float
                criteria: ">"
                value: "0"
            mode: Edge
            runProperties:
              probeTimeout: 30
              interval: 15
              retry: 2
