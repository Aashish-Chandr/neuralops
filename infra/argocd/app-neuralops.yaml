apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: neuralops
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Aashish-Chandr/neuralops
    targetRevision: main
    path: infra/helm/neuralops
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: neuralops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

