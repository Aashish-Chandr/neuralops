# Default deny-all: no pod can talk to any other pod unless explicitly allowed
# Apply this first, then layer on the allow rules
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: neuralops
spec:
  podSelector: {}   # applies to ALL pods in namespace
  policyTypes:
    - Ingress
    - Egress
