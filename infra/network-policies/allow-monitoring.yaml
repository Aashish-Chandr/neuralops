apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: neuralops
spec:
  podSelector: {}   # all pods in neuralops namespace
  policyTypes:
    - Ingress
  ingress:
    # Allow Prometheus (in monitoring namespace) to scrape /metrics
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8000   # microservices
        - port: 8080   # inference server
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-loki-ingress
  namespace: neuralops
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Allow all pods to send logs to Loki (via promtail sidecar or stdout)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 3100
