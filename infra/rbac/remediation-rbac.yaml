apiVersion: v1
kind: ServiceAccount
metadata:
  name: remediation-engine
  namespace: neuralops
---
# Principle of least privilege: only the exact verbs needed
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: remediation-engine
  namespace: neuralops
rules:
  # Restart pods by deleting them (k8s recreates automatically)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  # Scale deployments up
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update"]
  # Read deployment history for rollback detection
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: remediation-engine
  namespace: neuralops
subjects:
  - kind: ServiceAccount
    name: remediation-engine
    namespace: neuralops
roleRef:
  kind: Role
  name: remediation-engine
  apiGroup: rbac.authorization.k8s.io
