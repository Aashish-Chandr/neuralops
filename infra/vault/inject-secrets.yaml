# Example: inference-server pod with Vault agent sidecar injection
# The Vault agent automatically fetches secrets and writes them as env vars
# No secrets in Kubernetes Secrets or env vars — zero plaintext credentials
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-server-vault-example
  namespace: neuralops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-server
  template:
    metadata:
      labels:
        app: inference-server
      annotations:
        # Vault agent sidecar injection
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "inference-server"

        # Inject MLflow URI as a file
        vault.hashicorp.com/agent-inject-secret-mlflow: "secret/data/neuralops/mlflow"
        vault.hashicorp.com/agent-inject-template-mlflow: |
          {{- with secret "secret/data/neuralops/mlflow" -}}
          export MLFLOW_TRACKING_URI="{{ .Data.data.tracking_uri }}"
          {{- end }}

        # Inject Kafka bootstrap servers
        vault.hashicorp.com/agent-inject-secret-kafka: "secret/data/neuralops/kafka"
        vault.hashicorp.com/agent-inject-template-kafka: |
          {{- with secret "secret/data/neuralops/kafka" -}}
          export KAFKA_BOOTSTRAP_SERVERS="{{ .Data.data.bootstrap_servers }}"
          {{- end }}
    spec:
      serviceAccountName: inference-server
      containers:
        - name: inference-server
          image: ghcr.io/Aashish-Chandr/neuralops/inference-server:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              source /vault/secrets/mlflow
              source /vault/secrets/kafka
              uvicorn inference_server:app --host 0.0.0.0 --port 8080
          ports:
            - containerPort: 8080

