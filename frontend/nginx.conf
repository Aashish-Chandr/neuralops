# Railway sets $PORT dynamically — nginx must listen on it.
# We use an envsubst entrypoint to inject it at runtime.
server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* to the api-gateway service on Railway private network
    location /api/ {
        proxy_pass http://api-gateway.railway.internal:${API_GATEWAY_PORT:-8090}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
