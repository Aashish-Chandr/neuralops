name: CD — Build, Push, Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "infra/helm/neuralops/values.yaml"
      - "**.md"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: inference-server
            context: .
            dockerfile: ml/Dockerfile

          - name: metrics-exporter
            context: .
            dockerfile: streaming/Dockerfile

          - name: remediation-engine
            context: .
            dockerfile: remediation/Dockerfile

          - name: drift-detector
            context: .
            dockerfile: drift/Dockerfile.ci

          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile

          - name: api-gateway
            context: frontend/api-gateway
            dockerfile: frontend/api-gateway/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "prefix=ghcr.io/${OWNER}/neuralops" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.image.outputs.prefix }}/${{ matrix.name }}:latest
            ${{ steps.image.outputs.prefix }}/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-helm-values:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in Helm values
        run: |
          sed -i "s|tag: .*|tag: ${{ github.sha }}|g" infra/helm/neuralops/values.yaml

      - name: Commit updated values
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/helm/neuralops/values.yaml
          git diff --staged --quiet || git commit -m "chore: bump image tags to ${{ github.sha }} [skip ci]"
          git push
